name: Kotlin CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: [actions/checkout@v4](https://github.com)
    - name: Set up JDK 21
      uses: [actions/setup-java@v4](https://github.com)
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Build with Gradle
      run: gradle clean buildPlugin

